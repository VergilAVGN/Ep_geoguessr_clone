<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Settings</h1>
            <p>Здесь вы можете изменить базовые игровые параметры.</p>

            <form id="settingsForm">
                <div class="form-row checkbox-row">
                    <label>
                        <input type="checkbox" id="showHints" name="showHints">
                        Показывать подсказки
                    </label>
                </div>

                <div class="form-row checkbox-row">
                    <label>
                        <input type="checkbox" id="showTimer" name="showTimer">
                        Таймер
                    </label>
                </div>

                <div class="button-row">
                    <button type="button" class="btn" onclick="saveSettings()">Сохранить</button>
                    <a class="btn secondary ghost" href="/">Назад</a>
                </div>
            </form>

            <div id="statusMessage" class="status-message"></div>
        </div>
    </div>
    <script src="/static/js/settings.js"></script>
</body>
</html>

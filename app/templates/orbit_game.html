<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Game</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/orbit_game.css">
    <link rel="stylesheet" href="/static/css/guess_map.css">
</head>
<body class="orbit-game-body">
    <main class="orbit-game">
        <div class="orbit-game__viewport">
            <img
                class="orbit-game__satellite-image"
                id="orbit-satellite-image"
                alt="Satellite imagery"
            >

            <div class="orbit-game__overlay">
                <a class="orbit-game__back-link" href="/">← to the main page</a>
                <button
                    type="button"
                    class="orbit-game__back-link"
                    id="orbit-new-image-btn"
                >
                    New Image
                </button>
            </div>
        </div>

        {% include "partials/guess_map.html" %}
    </main>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script src="/static/js/guess_map.js"></script>
    <script src="/static/js/orbit_imagery.js"></script>
    <script src="/static/js/orbit_game.js"></script>
</body>
</html>
